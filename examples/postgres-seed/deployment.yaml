# Postgres wait + seed example
#
# This example shows a deployment that:
# 1. Waits for Postgres to be reachable
# 2. Seeds initial data
#
# Usage:
#   kubectl apply -f examples/postgres-seed/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-with-seed
  labels:
    app: app-with-seed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-with-seed
  template:
    metadata:
      labels:
        app: app-with-seed
    spec:
      initContainers:
        - name: wait-for-postgres
          image: ghcr.io/kitstream/initium:latest
          args:
            - wait-for
            - --target
            - tcp://postgres:5432
            - --timeout
            - "120s"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

        - name: seed-data
          image: ghcr.io/kitstream/initium:latest
          args:
            - seed
            - --spec
            - /seeds/seed.yaml
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: url
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: workdir
              mountPath: /work
            - name: seed-specs
              mountPath: /seeds
              readOnly: true

      containers:
        - name: app
          image: myapp:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: workdir
              mountPath: /work
              readOnly: true

      volumes:
        - name: workdir
          emptyDir: {}
        - name: seed-specs
          configMap:
            name: seed-specs
